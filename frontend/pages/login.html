<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    ============================================================
    JuaKaliHub — Login Page
    ============================================================
    Save this file at: juakalihub/public/login.html
  -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="JuaKaliHub — Login to access Kenya's skilled artisans." />
  <title>JuaKaliHub | Login</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Inline CSS (copying styling from index.html for consistency) -->
  <style>
    :root {
      --clr-bg: #0d1117;
      --clr-surface: #161b22;
      --clr-border: #21262d;
      --clr-accent: #f0a500;
      --clr-accent-dim: #c47f00;
      --clr-green: #3fb950;
      --clr-text: #e6edf3;
      --clr-muted: #8b949e;
      --clr-nav-bg: rgba(13,17,23,0.82);

      --font-display: "Syne", sans-serif;
      --font-body: "Noto Sans", sans-serif;

      --radius-sm: 6px;
      --radius-md: 12px;
      --radius-lg: 20px;

      --shadow-card: 0 4px 24px rgba(0,0,0,0.4);
      --transition: 0.22s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background-color: var(--clr-bg);
      color: var(--clr-text);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.7;
      overflow-x: hidden;
    }
    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }

    .container { width: 90%; max-width: 1140px; margin-inline: auto; }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 0.7rem 1.6rem; border-radius: var(--radius-sm);
      font-family: var(--font-body); font-size: 0.95rem;
      font-weight: 600; cursor: pointer; border: none;
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
    }
    .btn-primary { background: var(--clr-accent); color: #000; }
    .btn-primary:hover { background: var(--clr-accent-dim); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(240,165,0,0.35); }
    .btn-outline { background: transparent; color: var(--clr-text); border: 1.5px solid var(--clr-border); }
    .btn-outline:hover { border-color: var(--clr-accent); color: var(--clr-accent); transform: translateY(-2px); }

    /* Navbar (reuse from index.html) */
    .navbar { position: fixed; top:0; left:0; right:0; z-index:100; background: var(--clr-nav-bg); backdrop-filter: blur(14px); border-bottom: 1px solid var(--clr-border); }
    .navbar__inner { display:flex; align-items:center; justify-content:space-between; padding:0.9rem 0; }
    .navbar__logo { font-family: var(--font-display); font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; color: var(--clr-text); }
    .navbar__logo span { color: var(--clr-accent); }
    .navbar__links { display:flex; gap:2rem; list-style:none; }
    .navbar__links a { font-size:0.9rem; font-weight:500; color: var(--clr-muted); position:relative; transition: color var(--transition); }
    .navbar__links a::after { content:""; position:absolute; bottom:-4px; left:0; width:0; height:2px; background:var(--clr-accent); border-radius:2px; transition:width var(--transition); }
    .navbar__links a:hover { color: var(--clr-text); }
    .navbar__links a:hover::after { width:100%; }
    .navbar__cta { padding: 0.45rem 1.1rem; font-size:0.88rem; }

    /* Hamburger (mobile) */
    .hamburger { display:none; flex-direction:column; gap:5px; background:none; border:none; cursor:pointer; padding:4px; }
    .hamburger span { display:block; width:24px; height:2px; background: var(--clr-text); border-radius:2px; transition: transform var(--transition), opacity var(--transition); }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity:0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .mobile-menu { display:none; flex-direction:column; gap:0; padding:0.5rem 0 1rem; border-top:1px solid var(--clr-border); }
    .mobile-menu.open { display:flex; }
    .mobile-menu a { padding:0.75rem 0; font-weight:500; color: var(--clr-muted); transition: color var(--transition); }
    .mobile-menu a:hover { color: var(--clr-accent); }

    /* ============================================================
       LOGIN SECTION
       ============================================================ */
    .login-section { min-height: 100vh; display:flex; align-items:center; justify-content:center; padding-top:80px; }
    .login-card {
      background: var(--clr-surface); border:1px solid var(--clr-border);
      border-radius: var(--radius-lg); padding:3rem; width:100%; max-width:420px;
      box-shadow: var(--shadow-card); text-align:center;
    }
    .login-card h2 { font-family: var(--font-display); font-size:2rem; font-weight:800; margin-bottom:1.5rem; }
    .login-card form { display:flex; flex-direction:column; gap:1rem; text-align:left; }
    .login-card label { font-size:0.9rem; font-weight:500; margin-bottom:0.3rem; }
    .login-card input {
      width:100%; padding:0.7rem 1rem; border-radius:var(--radius-sm);
      border:1px solid var(--clr-border); background:var(--clr-bg);
      color: var(--clr-text); font-family: var(--font-body);
    }
    .login-card input:focus { outline:none; border-color: var(--clr-accent); }
    .login-card .form-actions { display:flex; justify-content:space-between; align-items:center; margin-top:1rem; }
    .login-card .forgot { font-size:0.82rem; color: var(--clr-muted); }
    .login-card .forgot:hover { color: var(--clr-accent); }

    @media(max-width:768px) {
      .hamburger { display:flex; }
      .navbar__links { display:none; }
      .navbar__cta { display:none; }
    }
  </style>
</head>

<body>
  <!-- NAVIGATION BAR -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="container">
      <div class="navbar__inner">
        <a href="index.html" class="navbar__logo">JuaKali<span>Hub</span></a>

        <ul class="navbar__links">
          <li><a href="index.html">Home</a></li>
          <li><a href="workers.html">Workers</a></li>
          <li><a href="dashboard.html">Dashboard</a></li>
          <li><a href="register.html">Register</a></li>
        </ul>

        <a href="login.html" class="btn btn-primary navbar__cta">Login</a>

        <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>

      <div class="mobile-menu" id="mobileMenu" role="menu">
        <a href="index.html">Home</a>
        <a href="workers.html">Workers</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="register.html">Register</a>
        <a href="login.html">Login</a>
      </div>
    </div>
  </nav>

  <!-- LOGIN SECTION -->
  <section class="login-section">
    <div class="login-card">
      <h2>Login to Your Account</h2>
      <form action="#" method="POST">
        <div>
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>
        <div>
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>
        <div class="form-actions">
          <a href="#" class="forgot">Forgot password?</a>
          <button type="submit" class="btn btn-primary">Login</button>
        </div>
      </form>
      <p style="margin-top:1.5rem; font-size:0.9rem; color: var(--clr-muted);">
        Don't have an account? <a href="register.html" style="color: var(--clr-accent);">Register here</a>
      </p>
    </div>
  </section>

  <script>
    // Mobile hamburger toggle
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      mobileMenu.classList.toggle('open');
    });
  </script>
</body>
</html>
